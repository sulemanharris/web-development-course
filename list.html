<!DOCTYPE html>
<html>
    <head>
        <title>Lists in Html</title>
    </head>
    <body>
        <h2>ordered list</h1>
        <ol>
            <li>suleman</li>
            <li>hina</li>
            <li>ali</li>
        </ol>
        <h2>unordered list</h2>
        <ul>
            <li>suleman</li>
            <li>hina</li>
            <li>ali</li>
        </ul>
        <h2>description list</h2>
        <dl>
            <dt>HTML</dt>
            <dd>Hyper Text Markup Language</dd>
        </dl>
        </body>
</html>
